/* ─── Design tokens (PRD § 21.3) ───────────────────────────── */

  --ink-4:        #9A9A9A;

  --accent-deep:  #122C20;
  --accent-soft:  #E2EBE5;
  --ai:           #5B3FB8;
  --ai-soft:      #ECE6FA;
  --ok:           #2E7D32;
  --ok-soft:      #E5F0E5;

}
[data-theme="dark"] {

  --bg-card:      #232020;
  --bg-elevated:  #2A2625;
  --rule:         #3A3636;
  --rule-soft:    #2F2C2C;
  --ink:          #F2EDE3;
  --ink-2:        #D0C9BF;
  --ink-3:        #908A82;
  --ink-4:        #5F5A55;

.health-pill::before { content: ""; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.health-pill.on_track::before { background: var(--ok); }
.health-pill.at_risk { background: var(--warn-soft); color: var(--warn); border-color: var(--warn-soft); }
.health-pill.at_risk::before { background: var(--warn); }
.health-pill.blocked { background: var(--danger-soft); color: var(--danger); border-color: var(--danger-soft); }

.tooltip {

.login-page { display: flex; min-height: 100vh; }

.login-right { flex: 1; display: flex; align-items: center; justify-content: center; padding: 64px; }
.login-form { width: 100%; max-width: 360px; }
.brand-logo { font-family: var(--font-display); font-size: 56px; line-height: 1; font-style: italic; }
.brand-logo .x { color: var(--accent); }
.brand-tag { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-3); margin-top: 12px; display: flex; align-items: center; gap: 10px; }
.brand-tag::before { content: ""; width: 28px; height: 1px; background: var(--rule); }
.login-headline { font-family: var(--font-display); font-size: 56px; line-height: 1.05; margin-top: 48px; }

.sample-accounts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.sample-account .role { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); }

.row { display: flex; align-items: center; gap: 10px; }
.col { display: flex; flex-direction: column; gap: 10px; }
.section { margin-bottom: 28px; }

/* ─── Epic kanban ──────────────────────────────────────────── */
.kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

.lane-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }

.epic-card { background: var(--bg-card); border: 1px solid var(--rule-soft); border-radius: 6px; padding: 12px; margin-bottom: 8px; cursor: pointer; }

/* ─── Milestone Gantt ──────────────────────────────────────── */
.milestone-row { display: grid; grid-template-columns: 200px 1fr 80px; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--rule-soft); }
.milestone-row:last-child { border-bottom: 0; }

/* ─── Tabs ─────────────────────────────────────────────────── */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--rule); margin-bottom: 20px; }
.tab { padding: 10px 16px; font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); border-bottom: 2px solid transparent; margin-bottom: -1px; cursor: pointer; }
.tab:hover { color: var(--ink-2); }
.tab.active { color: var(--ink); border-bottom-color: var(--accent); }

/* ─── Modal ────────────────────────────────────────────────── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(26,26,26,0.4); z-index: 100; display: flex; align-items: flex-start; justify-content: center; padding-top: 10vh; }
.modal { background: var(--bg-card); border-radius: 8px; box-shadow: var(--shadow); width: 100%; max-width: 560px; max-height: 80vh; overflow-y: auto; }
.modal.sm { max-width: 420px; }
.modal.lg { max-width: 760px; }

.modal-head h2 { font-family: var(--font-display); font-size: 22px; line-height: 1.2; }

.toast { background: var(--ink); color: var(--bg-card); padding: 12px 18px; border-radius: 6px; font-size: 13px; min-width: 240px; box-shadow: var(--shadow); animation: slideIn .2s ease-out; }
.toast.success { background: var(--ok); }

.notif-row { display: grid; grid-template-columns: 24px 1fr auto; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--rule-soft); align-items: start; }
.notif-row:hover { background: var(--bg-elevated); }
.notif-row.unread { background: var(--accent-soft); }

.truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-6 { gap: 24px; }

.text-center { text-align: center; }
.text-right { text-align: right; }
.text-ink-3 { color: var(--ink-3); }

.divider { width: 1px; background: var(--rule); align-self: stretch; }

*::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

<script>
/* ════════════════════════════════════════════════════════════════

 * Single-file SPA. State in localStorage. Hash router.
 * ════════════════════════════════════════════════════════════════ */

// ─── Constants ───────────────────────────────────────────────

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    // Defensive: hydrate missing keys
    const def = defaultState();
    return { ...def, ...parsed };
  } catch {
    return defaultState();
  }
}

let state = loadState();

function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function setState(patch) {
  state = { ...state, ...patch };
  persist();
  render();
}

function resetMockData() {
  if (!confirm("Reset all demo data? This restores seed Epics, Milestones, Bugs, etc.")) return;
  state = defaultState();
  state.currentUserId = null;
  persist();
  toast("Demo data reset", "success");
  navigate("/login");
}

const $$ = (sel, el = document) => Array.from(el.querySelectorAll(sel));
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const fmtDate = (s) => s ? new Date(s).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) : "—";
const fmtShortDate = (s) => s ? new Date(s).toLocaleDateString("en-GB", { day: "2-digit", month: "short" }) : "—";
const relTime = (s) => {
  if (!s) return "";
  const diff = (new Date(s).getTime() - Date.now()) / 1000;
  const abs = Math.abs(diff);
  const sign = diff > 0 ? "in " : "";
  const suf = diff > 0 ? "" : " ago";
  if (abs < 60) return "just now";
  if (abs < 3600) return `${sign}${Math.round(abs/60)}m${suf}`;
  if (abs < 86400) return `${sign}${Math.round(abs/3600)}h${suf}`;
  if (abs < 30*86400) return `${sign}${Math.round(abs/86400)}d${suf}`;
  return fmtShortDate(s);
};

// ─── Epic health (PRD § 13.3, § 12) ──────────────────────────
function computeEpicHealth(epic) {
  if (!epic) return { health: "not_started", timeBurn: 0, progressBurn: 0, deviation: 0 };
  const now = Date.now();
  const start = new Date(epic.startDate).getTime();
  const end = new Date(epic.targetEndDate).getTime();

  if (now < start) return { health: "not_started", timeBurn: 0, progressBurn: 0, deviation: 0 };

  const timeBurn = Math.max(0, Math.min(1, (now - start) / Math.max(1, end - start)));

  const ms = milestonesForEpic(epic.id);
  let progressBurn;
  if (ms.length > 0) {
    const done = ms.filter(m => m.status === "complete").length;
    progressBurn = done / ms.length;
  } else {
    const bugs = bugsForEpic(epic.id);
    const done = bugs.filter(b => b.status === "verified").length;
    progressBurn = bugs.length === 0 ? 0 : done / bugs.length;
  }

  const deviation = timeBurn - progressBurn;

  let health;
  if (now > end && progressBurn < 1) health = "blocked";
  else if (deviation >= 0.25) health = "blocked";
  else if (deviation >= 0.10) health = "at_risk";
  else health = "on_track";

  return { health, timeBurn, progressBurn, deviation };
}

function healthPill(epic) {
  const h = computeEpicHealth(epic);
  const tip = h.health === "not_started"
    ? `Starts ${fmtShortDate(epic.startDate)}`
    : (h.health === "blocked" && Date.now() > new Date(epic.targetEndDate).getTime())
      ? `Past target end · ${Math.round((1 - h.progressBurn) * 100)}% remaining`
      : `time-burn ${Math.round(h.timeBurn*100)}% · progress-burn ${Math.round(h.progressBurn*100)}%`;
  return `<span class="health-pill ${h.health}">${h.health.replace("_"," ")}<span class="tooltip">${esc(tip)}</span></span>`;
}

function currentPath() {
  const h = location.hash || "#/login";
  const path = h.slice(1).split("?")[0];
  const query = h.includes("?") ? Object.fromEntries(new URLSearchParams(h.slice(h.indexOf("?") + 1))) : {};
  return { path, query };
}

function navigate(path) {
  location.hash = "#" + path;
}

window.addEventListener("hashchange", () => render());

// ─── Toast ───────────────────────────────────────────────────
function toast(msg, kind = "") {
  const stack = $("#toast-stack");
  const el = document.createElement("div");
  el.className = `toast ${kind}`;
  el.textContent = msg;
  stack.appendChild(el);
  setTimeout(() => { el.style.opacity = "0"; el.style.transition = "opacity .2s"; }, 2400);
  setTimeout(() => el.remove(), 2700);
}

// ─── Modal helpers ───────────────────────────────────────────
function openModal(html) {
  const m = document.createElement("div");
  m.className = "modal-backdrop";
  m.innerHTML = html;
  m.addEventListener("click", (e) => { if (e.target === m) closeModal(m); });
  document.body.appendChild(m);
  document.body.style.overflow = "hidden";
  return m;
}
function closeModal(m) {
  if (m && m.parentNode) m.parentNode.removeChild(m);
  document.body.style.overflow = "";
}
function closeAllModals() {
  $$(".modal-backdrop, .slideover-backdrop").forEach(m => m.remove());
  document.body.style.overflow = "";
}
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeAllModals(); });

/* ════════════════════════════════════════════════════════════════
 * VIEWS - one render function per route
 * ════════════════════════════════════════════════════════════════ */

function render() {
  const u = currentUser();
  const { path, query } = currentPath();

  // Public routes
  if (path === "/login" || path === "/" || path === "") {
    if (u) {
      navigate(u.role === "pm" ? "/epics" : "/me");
      return;
    }
    document.body.innerHTML = `<div id="app"></div><div id="toast-stack" class="toast-stack"></div>`;
    $("#app").innerHTML = viewLogin();
    bindLogin();
    return;
  }

  if (path.startsWith("/guideline")) {
    document.body.innerHTML = `<div id="app"></div><div id="toast-stack" class="toast-stack"></div>`;
    $("#app").innerHTML = viewGuideline(path);
    return;
  }

  // Authed gate
  if (!u) {
    navigate("/login");
    return;
  }

  // Authed shell
  document.body.innerHTML = `<div id="app"></div><div id="toast-stack" class="toast-stack"></div>`;
  let body = "";
  let routeKey = "";
  if (path === "/me")              { body = viewMe();       routeKey = "/me"; }
  else if (path === "/epics")      { body = viewEpics(query); routeKey = "/epics"; }
  else if (path.startsWith("/e/")) { body = viewEpicDetail(path.slice(3), query); routeKey = "/epics"; }
  else if (path === "/create")     { body = viewCreate(query); routeKey = "/create"; }
  else if (path.startsWith("/t/")) { body = viewBug(path.slice(3)); routeKey = "/t"; }
  else if (path === "/backlog")    { body = viewBacklog();  routeKey = "/backlog"; }
  else if (path === "/my-tickets") { body = viewMyBugs();   routeKey = "/my-tickets"; }
  else if (path === "/portfolio")  { body = viewPortfolio(); routeKey = "/portfolio"; }
  else if (path === "/notifications") { body = viewNotifications(); routeKey = "/notifications"; }
  else if (path === "/settings")   { body = viewSettings(query); routeKey = "/settings"; }
  else if (path.startsWith("/u/")) { body = viewUser(path.slice(3)); routeKey = "/u"; }
  else                              { body = viewNotFound(path); routeKey = ""; }

  $("#app").innerHTML = `
    <div class="app-shell">
      ${sidebar(routeKey)}
      <div class="main">
        ${topbar()}
        <div class="page-body">${body}</div>
      </div>
    </div>
  `;
  bindCommon();
  bindRoute(routeKey, path, query);
}

// ─── /me - Bug dashboard ─────────────────────────────────────
function viewMe() {
  const u = currentUser();
  const mine = state.bugs.filter(b => b.assigneeId === u.id && !isClosed(b));
  const myActive = mine.filter(b => ["in_progress","scheduled"].includes(b.status));
  const myQueued = mine.filter(b => b.status === "backlog");
  const myBlocked = mine.filter(b => b.blocked);
  const blockingOthers = state.bugs.filter(b =>
    b.assigneeId === u.id &&
    state.bugs.some(o => o.blocked && o.blocked.blockerKey === b.key)
  );

  // Mentions awaiting reply
  const mentionsForMe = state.comments
    .filter(c => c.mentions.includes(u.id) && c.authorId !== u.id)
    .filter(c => !state.comments.some(r => r.parentId === c.id && r.authorId === u.id))
    .slice(0, 5);

  const ageInStatus = (b) => {
    const t = b.startedAt ? new Date(b.startedAt).getTime() : new Date(b.createdAt).getTime();
    return (Date.now() - t) / DAY;
  };

  const bugRow = (b) => {
    const age = ageInStatus(b);
    const warn = (b.status === "in_progress" && age > 3) || (b.status === "review" && age > 2);
    return `
      <a class="card-tight" href="#/t/${esc(b.key)}" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--rule-soft);border-radius:6px;background:var(--bg-card);margin-bottom:6px;">
        <span class="pill" style="background:var(--danger-soft);color:var(--danger);border-color:var(--danger-soft);">${esc(b.severity)}</span>
        <span class="mono" style="font-size:12px;color:var(--ink-3);width:84px;">${esc(b.key)}</span>
        <span style="flex:1;font-size:13px;" class="truncate">${esc(b.title)}</span>
        <span class="pill">${esc(STATUS_LABEL[b.status])}</span>
        ${warn ? `<span class="pill warn">${age>3?"3d+":"2d+"}</span>` : ""}
        ${b.blocked ? `<span class="pill danger">⏸ blocked</span>` : ""}
      </a>`;
  };

  return `
    <div class="page-header">
      <div class="eyebrow">My Work · ${esc(u.displayName.split(" ")[0])}</div>
      <h1>Your <em>Bugs</em>, today.</h1>
      <p class="lede">Assigned · queued · blocking · blocked. Click any row for the slide-over; ${u.role === "pm" ? "Epic Board" : "queue"} is in the sidebar.</p>
    </div>

    <div class="grid-2">
      <div>
        <div class="eyebrow mb-3">My Bugs · ${myActive.length}</div>
        ${myActive.length === 0 ? `<div class="empty"><div class="ico">○</div><div>No active Bugs assigned to you.</div></div>` : myActive.map(bugRow).join("")}

        <div class="eyebrow mb-3 mt-6">Queued · ${myQueued.length}</div>
        ${myQueued.length === 0 ? `<div class="card card-tight text-ink-3" style="font-style:italic;font-size:13px;">Nothing waiting in your queue.</div>` : myQueued.map(bugRow).join("")}
      </div>

      <div>
        <div class="eyebrow mb-3">Blocking Others · ${blockingOthers.length}</div>
        ${blockingOthers.length === 0 ? `<div class="card card-tight text-ink-3" style="font-style:italic;font-size:13px;">Nothing.</div>` : blockingOthers.map(bugRow).join("")}

        <div class="eyebrow mb-3 mt-6">Blocked · ${myBlocked.length}</div>
        ${myBlocked.length === 0 ? `<div class="card card-tight text-ink-3" style="font-style:italic;font-size:13px;">Nothing.</div>` : myBlocked.map(bugRow).join("")}

        ${mentionsForMe.length > 0 ? `
          <div class="eyebrow mb-3 mt-6">Mentions awaiting reply · ${mentionsForMe.length}</div>
          <div class="card card-tight">
            ${mentionsForMe.map(m => {
              const author = findUser(m.authorId);
              const bug = findBug(m.entityId);
              return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--rule-soft);">
                ${avatar(author, "xs")}
                <span style="font-size:13px;color:var(--ink);">${esc(author?.displayName ?? "?")}</span>
                <span style="font-size:12px;color:var(--ink-3);" class="truncate flex-1">${esc(m.body)}</span>
                ${bug ? `<a class="mono" style="font-size:11px;color:var(--accent);" href="#/t/${esc(bug.key)}">${esc(bug.key)}</a>` : ""}
              </div>`;
            }).join("")}
          </div>` : ""}
      </div>
    </div>
  `;
}

// ─── /epics - Epic Board ─────────────────────────────────────
function viewEpics(query) {
  const u = currentUser();
  const view = query.view || "kanban";

  const epics = state.epics.slice().sort((a,b) => a.key.localeCompare(b.key));

  const tabs = ["kanban","list","table","timeline","backlog"];
  const tabStrip = `
    <div class="tabs mb-6">
      ${tabs.map(t => `<a class="tab ${t===view?"active":""}" href="#/epics?view=${t}">${t}</a>`).join("")}
    </div>`;

  const create = u.role === "pm" ? `<button class="btn primary" data-act="new-epic">+ New Epic</button>` : "";

  const header = `
    <div class="page-header" style="display:flex;align-items:flex-end;justify-content:space-between;gap:24px;">
      <div>
        <div class="eyebrow">Epic Board</div>
        <h1><em>Every</em> initiative, one surface.</h1>
        <p class="lede">${epics.length} Epics in flight. Computed health on every render. Use the view tabs to shift altitude.</p>
      </div>
      <div class="page-actions">${create}</div>
    </div>
    ${tabStrip}
  `;

  if (view === "kanban") {
    // Group by health
    const lanes = ["not_started","on_track","at_risk","blocked"];
    const grouped = Object.fromEntries(lanes.map(l => [l, []]));
    epics.forEach(e => grouped[computeEpicHealth(e).health].push(e));
    return header + `
      <div class="kanban">
        ${lanes.map(l => `
          <div class="lane">
            <div class="lane-head">
              <span class="lane-title">${l.replace("_"," ")}</span>
              <span class="lane-count">${grouped[l].length}</span>
            </div>
            ${grouped[l].map(epicCard).join("")}
          </div>`).join("")}
      </div>
    `;
  }

  if (view === "list") {
    return header + `
      <div class="card" style="padding:0;">
        ${epics.map(e => {
          const ms = milestonesForEpic(e.id);
          const done = ms.filter(m => m.status === "complete").length;
          const pm = findUser(e.pmPicId);
          return `<a href="#/e/${esc(e.key)}" style="display:grid;grid-template-columns:50px 1fr 120px 100px 100px 120px;gap:12px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--rule-soft);">
            <span class="mono" style="color:var(--ink-3);font-size:12px;">${esc(e.key)}</span>
            <span style="font-size:14px;">${esc(e.title)}</span>
            <span>${healthPill(e)}</span>
            <span class="mono" style="font-size:11px;color:var(--ink-3);">${ms.length > 0 ? `${done}/${ms.length} phases` : "no phases"}</span>
            <span class="mono" style="font-size:11px;color:var(--ink-3);">${fmtShortDate(e.targetEndDate)}</span>
            <span style="display:flex;align-items:center;gap:6px;">${avatar(pm,"xs")}<span style="font-size:12px;color:var(--ink-3);" class="truncate">${esc(pm?.displayName ?? "")}</span></span>
          </a>`;
        }).join("")}
      </div>`;
  }

  if (view === "table") {
    return header + `
      <table class="table">
        <thead><tr>
          <th>Key</th><th>Title</th><th>Health</th><th>Quarter</th><th>Phases</th><th>Programs</th><th>PM</th><th>Target</th>
        </tr></thead>
        <tbody>
          ${epics.map(e => {
            const ms = milestonesForEpic(e.id);
            const done = ms.filter(m => m.status === "complete").length;
            const pm = findUser(e.pmPicId);
            return `<tr onclick="location.hash='#/e/${esc(e.key)}'">
              <td class="mono">${esc(e.key)}</td>
              <td>${esc(e.title)}</td>
              <td>${healthPill(e)}</td>
              <td>${esc(e.quarter)}</td>
              <td>${ms.length === 0 ? "—" : `${done}/${ms.length}`}</td>
              <td>${e.programs.map(p => `<span class="pill" style="margin-right:2px;">${esc(p)}</span>`).join("")}</td>
              <td>${avatar(pm,"xs")} <span style="font-size:12px;">${esc(pm?.displayName ?? "")}</span></td>
              <td class="mono">${fmtShortDate(e.targetEndDate)}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>`;
  }

  if (view === "timeline") {
    // 12-week window centered on today
    const totalDays = 90;
    const startWindow = Date.now() - 30 * DAY;
    const endWindow = startWindow + totalDays * DAY;
    return header + `
      <div class="card">
        <div style="display:grid;grid-template-columns:240px 1fr;gap:14px;align-items:center;margin-bottom:8px;">
          <div></div>
          <div style="display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-3);">
            <span>${fmtShortDate(iso(startWindow))}</span>
            <span>Today</span>
            <span>${fmtShortDate(iso(endWindow))}</span>
          </div>
        </div>
        ${epics.map(e => {
          const s = Math.max(0, (new Date(e.startDate).getTime() - startWindow) / (totalDays * DAY)) * 100;
          const w = Math.min(100, (new Date(e.targetEndDate).getTime() - new Date(e.startDate).getTime()) / (totalDays * DAY)) * 100;
          const todayPct = ((Date.now() - startWindow) / (totalDays * DAY)) * 100;
          const h = computeEpicHealth(e).health;
          return `<div style="display:grid;grid-template-columns:240px 1fr;gap:14px;align-items:center;padding:8px 0;border-top:1px solid var(--rule-soft);">
            <a href="#/e/${esc(e.key)}" style="display:flex;align-items:center;gap:8px;">
              <span class="mono" style="font-size:11px;color:var(--ink-3);width:38px;">${esc(e.key)}</span>
              <span style="font-size:13px;" class="truncate">${esc(e.title)}</span>
            </a>
            <div class="gantt-track" style="height:14px;position:relative;">
              <div class="gantt-today" style="left:${todayPct}%"></div>
              <div class="gantt-bar" style="left:${s}%;width:${w}%;top:2px;bottom:2px;height:10px;border-radius:3px;background:${h==='on_track'?'var(--ok)':h==='at_risk'?'var(--warn)':h==='blocked'?'var(--danger)':'var(--rule)'};opacity:0.85;"></div>
            </div>
          </div>`;
        }).join("")}
      </div>`;
  }

  if (view === "backlog") {
    const backlogEpics = epics.filter(e => computeEpicHealth(e).health === "not_started");
    return header + (backlogEpics.length === 0
      ? `<div class="empty"><div class="ico">∅</div><h3>No upcoming Epics.</h3><div>Future-dated Epics appear here.</div></div>`
      : backlogEpics.map(epicCard).join(""));
  }

  return header;
}

function epicCard(e) {
  const ms = milestonesForEpic(e.id);
  const done = ms.filter(m => m.status === "complete").length;
  const pct = ms.length === 0 ? 0 : Math.round((done / ms.length) * 100);
  const h = computeEpicHealth(e);
  return `<a class="epic-card" href="#/e/${esc(e.key)}">
    <div class="row" style="justify-content:space-between;">
      <span class="key">${esc(e.key)}</span>
      ${healthPill(e)}
    </div>
    <div class="title">${esc(e.title)}</div>
    <div class="progress mb-3"><div class="progress-bar ${h.health}" style="width:${pct}%"></div></div>
    <div class="meta">
      ${e.programs.slice(0,3).map(p => `<span class="pill">${esc(p)}</span>`).join("")}
      <span class="mono" style="font-size:10px;color:var(--ink-3);margin-left:auto;">${ms.length > 0 ? `${done}/${ms.length} phases` : "no phases"}</span>
    </div>
  </a>`;
}

  const ms = milestonesForEpic(e.id).slice().sort((a,b) => new Date(a.targetDate) - new Date(b.targetDate));
  const bugs = bugsForEpic(e.id);
  const health = computeEpicHealth(e);
  const done = ms.filter(m => m.status === "complete").length;
  const pct = ms.length === 0 ? 0 : Math.round((done / ms.length) * 100);

  const header = `
    <div class="page-header">

      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:24px;">
        <div style="min-width:0;flex:1;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <span class="pill accent">${esc(e.quarter)}</span>
            ${healthPill(e)}
            ${e.programs.map(p => `<span class="pill">${esc(p)}</span>`).join("")}
          </div>
          <h1>${esc(e.title)}</h1>
        </div>
        <div style="text-align:right;min-width:240px;">
          <div class="eyebrow">PM</div>
          <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end;margin-top:4px;">
            ${avatar(pm, "sm")}
            <span style="font-size:13px;">${esc(pm?.displayName ?? "")}</span>
          </div>
          <div class="eyebrow mt-3">Target end</div>
          <div class="mono" style="margin-top:4px;">${fmtDate(e.targetEndDate)}</div>
        </div>
      </div>
    </div>

    <div class="tabs">
      ${["overview","milestones","bugs","activity","comments","links"].map(t => `<a class="tab ${t===tab?"active":""}" href="#/e/${esc(e.key)}?tab=${t}">${t}</a>`).join("")}
    </div>
  `;

  if (tab === "overview") {
    return header + `
      <div class="grid-2">
        <div>
          <div class="card mb-4">
            <div class="eyebrow mb-2">Thesis</div>
            <p style="font-size:14px;line-height:1.6;color:var(--ink-2);">${esc(e.thesis)}</p>
          </div>
          <div class="card">
            <div class="eyebrow mb-2">Description</div>
            <p style="font-size:13px;line-height:1.6;color:var(--ink-2);">${esc(e.description)}</p>
          </div>
        </div>
        <div>
          <div class="card mb-4">
            <div class="eyebrow mb-2">Progress</div>
            <div class="row gap-2 mb-2">
              <span style="font-size:24px;font-family:var(--font-display);">${pct}%</span>
              <span style="font-size:12px;color:var(--ink-3);">${ms.length > 0 ? `${done} of ${ms.length} milestones complete` : "no phases defined"}</span>
            </div>
            <div class="progress mb-3"><div class="progress-bar ${health.health}" style="width:${pct}%"></div></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-family:var(--font-mono);font-size:11px;color:var(--ink-3);">
              <div>time-burn: <strong style="color:var(--ink);">${Math.round(health.timeBurn*100)}%</strong></div>
              <div>progress-burn: <strong style="color:var(--ink);">${Math.round(health.progressBurn*100)}%</strong></div>
              <div>deviation: <strong style="color:var(--ink);">${(health.deviation*100).toFixed(0)}%</strong></div>
              <div>health: ${healthPill(e)}</div>
            </div>
          </div>
          <div class="card">
            <div class="eyebrow mb-2">Tags</div>
            <div class="row" style="flex-wrap:wrap;">
              ${e.tags.map(t => `<span class="pill">${esc(t)}</span>`).join("") || `<span style="color:var(--ink-3);font-style:italic;">No tags</span>`}
            </div>
            <div class="eyebrow mt-4 mb-2">Window</div>
            <div class="mono" style="font-size:12px;">${fmtDate(e.startDate)} → ${fmtDate(e.targetEndDate)}</div>
          </div>
        </div>
      </div>
    `;
  }

  if (tab === "milestones") {
    return header + milestonesTab(e, ms, u);
  }

  if (tab === "bugs") {
    return header + `
      <div class="row mb-4" style="justify-content:space-between;">
        <div class="eyebrow">Bugs · ${bugs.length}</div>
        <a class="btn primary sm" href="#/create?type=bug&epic=${esc(e.id)}">+ New Bug</a>
      </div>
      ${bugs.length === 0 ? `<div class="empty"><div class="ico">○</div><h3>No Bugs under this Epic yet.</h3></div>` : `
        <table class="table">
          <thead><tr><th>Key</th><th>Title</th><th>Severity</th><th>Status</th><th>Assignee</th><th>Created</th></tr></thead>
          <tbody>
            ${bugs.map(b => {
              const a = findUser(b.assigneeId);
              return `<tr onclick="location.hash='#/t/${esc(b.key)}'">
                <td class="mono">${esc(b.key)}</td>
                <td>${esc(b.title)}</td>
                <td><span class="pill" style="background:var(--danger-soft);color:var(--danger);border-color:var(--danger-soft);">${esc(b.severity)}</span></td>
                <td><span class="pill">${esc(STATUS_LABEL[b.status])}</span></td>
                <td>${a ? `${avatar(a,"xs")} <span style="font-size:12px;">${esc(a.displayName.split(" ")[0])}</span>` : `<span style="color:var(--ink-3);">—</span>`}</td>
                <td class="mono" style="font-size:11px;color:var(--ink-3);">${relTime(b.createdAt)}</td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      `}
    `;
  }

  if (tab === "comments") {
    const cs = state.comments.filter(c => c.entityType === "epic" && c.entityId === e.id);
    return header + commentsBlock(cs, "epic", e.id);
  }

  if (tab === "activity") {
    const events = [];
    ms.forEach(m => {
      if (m.status === "complete") events.push({ ts: m.actualDate, msg: `Milestone <strong>${esc(m.name)}</strong> marked complete${new Date(m.actualDate) > new Date(m.targetDate) ? ` (slipped ${Math.round((new Date(m.actualDate)-new Date(m.targetDate))/DAY)}d)` : ""}.` });
    });
    events.sort((a,b) => new Date(b.ts) - new Date(a.ts));
    return header + `
      <div class="eyebrow mb-3">Activity</div>
      <div class="card" style="padding:0;">
        ${events.length === 0 ? `<div class="empty"><div class="ico">·</div><div>No activity yet.</div></div>` : events.map(ev => `
          <div style="display:grid;grid-template-columns:100px 1fr;gap:12px;padding:12px 18px;border-bottom:1px solid var(--rule-soft);">
            <span class="mono" style="font-size:11px;color:var(--ink-3);">${fmtShortDate(ev.ts)}</span>
            <span style="font-size:13px;">${ev.msg}</span>
          </div>`).join("")}
      </div>`;
  }

  if (tab === "links") {
    return header + `<div class="empty"><div class="ico">⇄</div><h3>Cross-Epic links</h3><div>Dependencies between Epics surface here. Coming soon.</div></div>`;
  }

  return header;
}

function milestonesTab(e, ms, u) {
  const isPM = u.role === "pm";
  const totalDays = Math.max(1, (new Date(e.targetEndDate) - new Date(e.startDate)) / DAY);

  const milestonesList = ms.length === 0 ? `
    <div class="empty">
      <div class="ico">▭</div>
      <h3>No milestones yet.</h3>
      <div style="margin-bottom:14px;">Define sequential waterfall phases for this Epic.</div>
      ${isPM ? `<button class="btn primary" data-act="add-milestone" data-epic="${esc(e.id)}">Add your first phase →</button>` : ""}
    </div>` : `
    <div class="card mb-6" style="padding:0;">
      ${ms.map((m, i) => {
        const slip = m.actualDate && new Date(m.actualDate) > new Date(m.targetDate) ? Math.round((new Date(m.actualDate) - new Date(m.targetDate)) / DAY) : 0;
        const prevDone = i === 0 ? true : ms[i-1].status === "complete";
        const overdue = !m.actualDate && new Date() > new Date(m.targetDate);
        const statusPill = m.status === "complete" ? `<span class="pill ok">complete</span>`
          : m.status === "in_progress" ? `<span class="pill accent">in progress</span>`
          : overdue ? `<span class="pill danger">slipped</span>`
          : `<span class="pill">pending</span>`;
        return `<div id="milestone-${esc(m.id)}" style="display:grid;grid-template-columns:50px 1fr 200px 140px 110px;gap:14px;align-items:start;padding:16px 18px;border-bottom:1px solid var(--rule-soft);">
          <span class="mono" style="font-size:12px;color:var(--ink-3);">${String(i+1).padStart(2,"0")}</span>
          <div>
            <div style="font-size:14px;color:var(--ink);font-weight:500;">${esc(m.name)}</div>
            <div style="font-size:12px;color:var(--ink-3);margin-top:4px;">
              <strong style="color:var(--ink-2);">Entry:</strong> ${esc(m.entryCriteria)}
            </div>
            <div style="font-size:12px;color:var(--ink-3);margin-top:2px;">
              <strong style="color:var(--ink-2);">Exit:</strong> ${esc(m.exitCriteria)}
            </div>
          </div>
          <div>
            <div class="mono" style="font-size:11px;color:var(--ink-3);">Target ${fmtDate(m.targetDate)}</div>
            ${m.actualDate ? `<div class="mono" style="font-size:11px;color:${slip>0?"var(--danger)":"var(--ok)"};">Actual ${fmtDate(m.actualDate)}${slip>0?` · +${slip}d slip`:""}</div>` : ""}
          </div>
          <div>${statusPill}</div>
          <div>
            ${isPM && m.status === "in_progress" ? `<button class="btn primary sm" data-act="complete-milestone" data-id="${esc(m.id)}">Mark complete →</button>` : ""}
            ${isPM && m.status === "pending" && !prevDone ? `<button class="btn sm" disabled title="Previous milestone is still pending">Locked</button>` : ""}
            ${isPM && m.status === "pending" && prevDone ? `<button class="btn primary sm" data-act="complete-milestone" data-id="${esc(m.id)}">Start →</button>` : ""}
          </div>
        </div>`;
      }).join("")}
    </div>
    ${isPM ? `<button class="btn secondary" data-act="add-milestone" data-epic="${esc(e.id)}">+ Add phase</button>` : ""}
  `;

  // Gantt
  const gantt = ms.length === 0 ? "" : `
    <div class="card mt-6">
      <div class="eyebrow mb-3">Phase Gantt · planned vs. actual</div>
      <div style="display:grid;grid-template-columns:160px 1fr;gap:12px;align-items:center;margin-bottom:6px;">
        <div></div>
        <div style="display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-3);">
          <span>${fmtShortDate(e.startDate)}</span>
          <span>Today</span>
          <span>${fmtShortDate(e.targetEndDate)}</span>
        </div>
      </div>
      ${ms.map(m => {
        // Planned bar: previous milestone's target -> this milestone's target (or start of epic -> target if first)
        const prev = ms[ms.indexOf(m) - 1];
        const plannedStart = prev ? new Date(prev.targetDate).getTime() : new Date(e.startDate).getTime();
        const plannedEnd = new Date(m.targetDate).getTime();
        const epicStart = new Date(e.startDate).getTime();
        const epicEnd = new Date(e.targetEndDate).getTime();
        const range = epicEnd - epicStart;
        const pS = Math.max(0, (plannedStart - epicStart) / range) * 100;
        const pW = Math.max(1, (plannedEnd - plannedStart) / range) * 100;
        const todayPct = Math.min(100, Math.max(0, (Date.now() - epicStart) / range * 100));

        let actualBar = "";
        if (m.actualDate) {
          const aEnd = new Date(m.actualDate).getTime();
          const aW = Math.max(1, (aEnd - plannedStart) / range) * 100;
          const slip = aEnd > plannedEnd;
          actualBar = `<div class="gantt-bar actual" style="left:${pS}%;width:${aW}%;background:${slip?"var(--danger)":"var(--ok)"};"></div>`;
        } else if (m.status === "in_progress") {
          const nowPct = (Date.now() - epicStart) / range * 100;
          const w = Math.max(1, nowPct - pS);
          actualBar = `<div class="gantt-bar in-progress" style="left:${pS}%;width:${w}%;"></div>`;
        }
        return `<div style="display:grid;grid-template-columns:160px 1fr;gap:12px;align-items:center;padding:6px 0;border-top:1px solid var(--rule-soft);">
          <span style="font-size:12px;">${esc(m.name)}</span>
          <div class="gantt-track">
            <div class="gantt-today" style="left:${todayPct}%"></div>
            <div class="gantt-bar planned" style="left:${pS}%;width:${pW}%;"></div>
            ${actualBar}
          </div>
        </div>`;
      }).join("")}
      <div class="row gap-4 mt-3" style="font-family:var(--font-mono);font-size:10px;color:var(--ink-3);">
        <span class="row gap-2"><span style="width:18px;height:5px;background:var(--rule);border-radius:2px;"></span> planned</span>
        <span class="row gap-2"><span style="width:18px;height:5px;background:var(--ok);border-radius:2px;"></span> actual (on time)</span>
        <span class="row gap-2"><span style="width:18px;height:5px;background:var(--danger);border-radius:2px;"></span> slipped</span>
        <span class="row gap-2"><span style="width:18px;height:5px;background:var(--accent-soft);border:1px dashed var(--accent);border-radius:2px;"></span> in progress</span>
      </div>
    </div>
  `;

  return `
    <div class="row mb-4" style="justify-content:space-between;">
      <div class="eyebrow">Milestones · ${ms.filter(x=>x.status==='complete').length}/${ms.length} complete</div>
      ${isPM && ms.length > 0 ? `<button class="btn secondary sm" data-act="add-milestone" data-epic="${esc(e.id)}">+ Add phase</button>` : ""}
    </div>
    ${milestonesList}
    ${gantt}
  `;
}

function commentsBlock(comments, entityType, entityId) {
  return `
    <div class="card mb-4">
      <textarea class="textarea" id="cmt-${entityType}-${entityId}" placeholder="Add a comment… (@mention supported)" style="min-height:80px;"></textarea>
      <div class="row mt-3" style="justify-content:flex-end;">
        <button class="btn primary sm" data-act="post-comment" data-et="${entityType}" data-eid="${entityId}">Post</button>
      </div>
    </div>
    ${comments.length === 0 ? `<div class="empty"><div class="ico">○</div><div>No comments yet.</div></div>` : comments.slice().reverse().map(c => {
      const a = findUser(c.authorId);
      return `<div class="card mb-3">
        <div class="row gap-2 mb-2">
          ${avatar(a,"sm")}
          <strong style="font-size:13px;">${esc(a?.displayName ?? "")}</strong>
          <span class="mono" style="font-size:11px;color:var(--ink-3);">${relTime(c.createdAt)}</span>
        </div>
        <div style="font-size:13px;line-height:1.5;">${esc(c.body)}</div>
      </div>`;
    }).join("")}
  `;
}

function viewCreate(query) {

  const canEpic = u.role === "pm";

  if (!type) {
    return `

        <div class="eyebrow">Create</div>

        <p class="lede">Pick a kind. Engineers can only file Bugs in the waterfall model.</p>

        <a class="card" href="#/create?type=bug" style="border-left:4px solid var(--accent);">
          <div class="row" style="justify-content:space-between;margin-bottom:10px;"><span style="font-size:24px;">🐞</span><span class="pill">Universal</span></div>
          <h3 class="display" style="font-size:24px;">Bug</h3>
          <p style="font-size:13px;color:var(--ink-3);margin-top:6px;">Something broken. Repro / Expected / Actual required. Lands in Backlog.</p>
          <div class="mono mt-3" style="font-size:11px;color:var(--ink-4);">BUG-####</div>
        </a>
        ${canEpic ? `
        <a class="card" href="#/create?type=epic" style="border-left:4px solid var(--accent);">
          <div class="row" style="justify-content:space-between;margin-bottom:10px;"><span style="font-size:24px;">⊕</span><span class="pill accent">PM Lane</span></div>
          <h3 class="display" style="font-size:24px;">Epic</h3>
          <p style="font-size:13px;color:var(--ink-3);margin-top:6px;">Strategic initiative at quarter altitude. Title + thesis + programs + waterfall milestones.</p>
          <div class="mono mt-3" style="font-size:11px;color:var(--ink-4);">EPC-####</div>
        </a>` : `
        <div class="card" style="opacity:0.5;">
          <div class="row" style="justify-content:space-between;margin-bottom:10px;"><span style="font-size:24px;">⊕</span><span class="pill">PM only</span></div>
          <h3 class="display" style="font-size:24px;">Epic</h3>
          <p style="font-size:13px;color:var(--ink-3);margin-top:6px;">Only the PM role can file Epics.</p>
        </div>`}
      </div>
      <div class="card mt-6" style="background:var(--bg-elevated);">
        <div class="eyebrow mb-2">Where it lands</div>
        <p style="font-size:13px;color:var(--ink-3);line-height:1.5;">Bugs land in Backlog. Epics land on the Epic Board with health=not_started until startDate is reached.</p>
      </div>
    `;
  }

  if (type === "epic" && !canEpic) return tombstone("forbidden", "/create?type=epic");

  if (type === "bug") return viewBugForm(query);
  if (type === "epic") return viewEpicForm();
  return viewCreate({});
}

        <button class="btn primary" type="submit">Create Epic →</button>
      </div>
    </form>
  `;
}

// ─── /t/[key] - Bug detail ───────────────────────────────────
function viewBug(key) {
  const b = findBugByKey(key);
  if (!b) return tombstone("bug", key);
  if (b.status === "cancelled" || b.status === "cannot_reproduce") {
    return tombstone(b.status, b.key, b);
  }
  const u = currentUser();
  const epic = findEpic(b.epicId);
  const author = findUser(b.authorId);
  const assignee = findUser(b.assigneeId);
  const next = (STATUS_FLOW[b.status] || [])[0];
  const acAllDone = b.acceptanceCriteria.every(ac => ac.done);
  const canVerify = b.acceptanceCriteria.length === 0 || acAllDone;
  const comments = state.comments.filter(c => c.entityType === "bug" && c.entityId === b.id);

  return `
    <div class="page-header">
      <div class="eyebrow"><a href="#/epics" style="color:var(--ink-3);">${esc(epic?.key ?? "Ad-hoc")}</a> › <span style="color:var(--ink);">${esc(b.key)}</span></div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:24px;">
        <div style="flex:1;min-width:0;">
          <div class="row mb-3" style="flex-wrap:wrap;">
            <span class="pill" style="background:var(--danger-soft);color:var(--danger);border-color:var(--danger-soft);">${esc(b.severity)}</span>
            <span class="pill" style="background:${b.priority==='P0'?'var(--danger-soft)':'var(--rule-soft)'};color:${b.priority==='P0'?'var(--danger)':'var(--ink-2)'};border-color:transparent;">${esc(b.priority)}</span>
            <span class="pill ${b.status === 'verified' ? 'ok' : ''}">${esc(STATUS_LABEL[b.status])}</span>
            ${b.blocked ? `<span class="pill danger">⏸ Blocked · ${esc(b.blocked.reason)}</span>` : ""}
          </div>
          <h1>${esc(b.title)}</h1>
        </div>
        <div class="page-actions">
          ${b.blocked
            ? `<button class="btn secondary sm" data-act="unblock-bug" data-id="${esc(b.id)}">Unblock</button>`
            : `<button class="btn secondary sm" data-act="block-bug" data-id="${esc(b.id)}">⊘ Mark blocked</button>`}
          ${next && (next !== "verified" || canVerify)
            ? `<button class="btn primary sm" data-act="advance-bug" data-id="${esc(b.id)}" data-next="${esc(next)}">Move to ${esc(STATUS_LABEL[next])} →</button>`
            : next === "verified" && !canVerify
              ? `<button class="btn sm" disabled title="All ACs must be checked">Move to Verified →</button>`
              : ""}
        </div>
      </div>
    </div>

    <div class="grid-3" style="grid-template-columns:2fr 1fr;gap:32px;">
      <div class="col">
        <div class="card">
          <div class="eyebrow mb-2">Description</div>
          <div style="font-size:14px;line-height:1.6;">${esc(b.description) || `<span class="text-ink-3" style="font-style:italic;">No description.</span>`}</div>
        </div>

        <div class="card" style="background:var(--bg-elevated);">
          <div class="eyebrow mb-3">Bug context</div>
          <div class="row mb-2"><strong style="width:120px;font-size:12px;color:var(--ink-3);">Repro steps</strong><div style="flex:1;font-size:13px;white-space:pre-wrap;">${esc(b.reproSteps) || "—"}</div></div>
          <hr/>
          <div class="row mb-2"><strong style="width:120px;font-size:12px;color:var(--ink-3);">Expected</strong><div style="flex:1;font-size:13px;">${esc(b.expected) || "—"}</div></div>
          <hr/>
          <div class="row mb-2"><strong style="width:120px;font-size:12px;color:var(--ink-3);">Actual</strong><div style="flex:1;font-size:13px;">${esc(b.actual) || "—"}</div></div>
          <hr/>
          <div class="row mb-2"><strong style="width:120px;font-size:12px;color:var(--ink-3);">Affected</strong><div style="flex:1;font-size:13px;">${esc(b.affectedScope) || "—"}</div></div>
          ${b.sentryLink ? `<hr/><div class="row mb-2"><strong style="width:120px;font-size:12px;color:var(--ink-3);">Sentry</strong><a class="mono" href="${esc(b.sentryLink)}" target="_blank" rel="noreferrer" style="font-size:12px;color:var(--accent);">${esc(b.sentryLink)}</a></div>` : ""}
        </div>

        <div>
          <div class="row mb-3"><div class="eyebrow">Acceptance Criteria · ${b.acceptanceCriteria.filter(a=>a.done).length}/${b.acceptanceCriteria.length}</div></div>
          ${b.acceptanceCriteria.length === 0 ? `<div class="card text-ink-3" style="font-style:italic;">No acceptance criteria defined.</div>` : `
            <div class="card" style="padding:0;">
              ${b.acceptanceCriteria.map(ac => `
                <label style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--rule-soft);cursor:pointer;">
                  <input type="checkbox" data-act="toggle-ac" data-bug="${esc(b.id)}" data-ac="${esc(ac.id)}" ${ac.done?"checked":""} />
                  <span style="font-size:13px;${ac.done?'text-decoration:line-through;color:var(--ink-4);':''}">${esc(ac.text)}</span>
                </label>
              `).join("")}
            </div>`}
        </div>

        <div>
          <div class="eyebrow mb-3">Comments · ${comments.length}</div>
          ${commentsBlock(comments, "bug", b.id)}
        </div>
      </div>

      <aside class="col" style="gap:14px;">
        <div class="card">
          <div class="eyebrow mb-2">Parent Epic</div>
          ${epic ? `<a href="#/e/${esc(epic.key)}" style="color:var(--accent);font-size:13px;">${esc(epic.key)} · ${esc(epic.title)}</a>` : `<span class="text-ink-3" style="font-style:italic;font-size:13px;">Ad-hoc</span>`}
        </div>
        <div class="card">
          <div class="eyebrow mb-2">Assignee</div>
          ${assignee ? `<div class="row gap-2">${avatar(assignee, "sm")}<span style="font-size:13px;">${esc(assignee.displayName)}</span></div>` : `<span class="text-ink-3" style="font-style:italic;font-size:13px;">Unassigned</span>`}

          <div class="eyebrow mt-4 mb-2">Reporter</div>
          ${author ? `<div class="row gap-2">${avatar(author, "sm")}<span style="font-size:13px;">${esc(author.displayName)}</span></div>` : "—"}

          <div class="eyebrow mt-4 mb-2">Created</div>
          <div class="mono" style="font-size:12px;color:var(--ink-3);">${fmtDate(b.createdAt)} · ${relTime(b.createdAt)}</div>

          <div class="eyebrow mt-4 mb-2">Tags</div>
          <div class="row" style="flex-wrap:wrap;">
            ${b.tags.map(t => `<span class="pill">${esc(t)}</span>`).join("") || `<span class="text-ink-3" style="font-style:italic;font-size:12px;">No tags</span>`}
          </div>

          <div class="eyebrow mt-4 mb-2">Programs</div>
          <div class="row" style="flex-wrap:wrap;">
            ${(b.programs || []).map(p => `<span class="pill accent">${esc(p)}</span>`).join("") || `<span class="text-ink-3" style="font-style:italic;font-size:12px;">Inherits Epic</span>`}
          </div>
        </div>
      </aside>
    </div>
  `;
}

// ─── /backlog ────────────────────────────────────────────────
function viewBacklog() {
  const bugs = state.bugs.filter(b => b.status === "backlog")
    .sort((a,b) => {
      const sev = { S1:0, S2:1, S3:2 };
      const pri = { P0:0, P1:1, P2:2 };
      return (sev[a.severity] - sev[b.severity]) || (pri[a.priority] - pri[b.priority]);
    });
  return `
    <div class="page-header">
      <div class="eyebrow">Backlog</div>
      <h1>Bugs waiting <em>triage</em>.</h1>
      <p class="lede">${bugs.length} unscheduled Bugs sorted by severity then priority.</p>
    </div>
    ${bugs.length === 0 ? `<div class="empty"><div class="ico">✓</div><h3>Backlog is clean.</h3></div>` : `
      <table class="table">
        <thead><tr><th>Key</th><th>Title</th><th>Severity</th><th>Priority</th><th>Epic</th><th>Age</th></tr></thead>
        <tbody>
          ${bugs.map(b => {
            const e = findEpic(b.epicId);
            const age = Math.round((Date.now() - new Date(b.createdAt))/DAY);
            const stale = age > 14;
            return `<tr onclick="location.hash='#/t/${esc(b.key)}'">
              <td class="mono">${esc(b.key)}</td>
              <td>${esc(b.title)}</td>
              <td><span class="pill" style="background:var(--danger-soft);color:var(--danger);border-color:var(--danger-soft);">${esc(b.severity)}</span></td>
              <td><span class="pill">${esc(b.priority)}</span></td>
              <td class="mono" style="font-size:11px;color:var(--ink-3);">${esc(e?.key ?? "Ad-hoc")}</td>
              <td class="mono" style="font-size:11px;color:${stale?'var(--warn)':'var(--ink-3)'};">${age}d</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>`}
  `;
}

// ─── /portfolio - Portfolio Health ───────────────────────────
function viewPortfolio() {
  const epics = state.epics;
  const computed = epics.map(e => ({ e, h: computeEpicHealth(e) }));
  const counts = {
    total: epics.length,
    on_track: computed.filter(x => x.h.health === "on_track").length,
    at_risk: computed.filter(x => x.h.health === "at_risk").length,
    blocked: computed.filter(x => x.h.health === "blocked").length,
    not_started: computed.filter(x => x.h.health === "not_started").length,
  };
  const programAlloc = ALL_PROGRAMS.map(p => ({
    p, count: epics.filter(e => e.programs.includes(p)).length,
  }));
  const maxProgram = Math.max(...programAlloc.map(x => x.count), 1);

  // Top blockers: high-priority blocked bugs
  const topBlockers = state.bugs
    .filter(b => b.blocked && ["P0","P1"].includes(b.priority))
    .slice(0, 5);

  return `
    <div class="page-header">
      <div class="eyebrow">Portfolio Health</div>
      <h1>The <em>quarter</em>, at a glance.</h1>
      <p class="lede">Computed health for every Epic. Refresh on every render — no manual updates required.</p>
    </div>

    <div class="grid-4 mb-6">
      <div class="card" style="border-left:4px solid var(--ink-4);">
        <div class="eyebrow">Total Epics</div>
        <div style="font-family:var(--font-display);font-size:32px;margin-top:6px;">${counts.total}</div>
      </div>
      <div class="card" style="border-left:4px solid var(--ok);">
        <div class="eyebrow">On track</div>
        <div style="font-family:var(--font-display);font-size:32px;margin-top:6px;color:var(--ok);">${counts.on_track}</div>
      </div>
      <div class="card" style="border-left:4px solid var(--warn);">
        <div class="eyebrow">At risk</div>
        <div style="font-family:var(--font-display);font-size:32px;margin-top:6px;color:var(--warn);">${counts.at_risk}</div>
      </div>
      <div class="card" style="border-left:4px solid var(--danger);">
        <div class="eyebrow">Blocked</div>
        <div style="font-family:var(--font-display);font-size:32px;margin-top:6px;color:var(--danger);">${counts.blocked}</div>
      </div>
    </div>

    <div class="grid-2 mb-6">
      <div class="card">
        <div class="eyebrow mb-3">Allocation by program</div>
        <div>
          ${programAlloc.map(({p,count}) => `
            <div style="display:grid;grid-template-columns:80px 1fr 32px;gap:10px;align-items:center;padding:6px 0;">
              <span class="mono" style="font-size:11px;color:var(--ink-3);">${esc(p)}</span>
              <div style="height:14px;background:var(--bg-elevated);border-radius:3px;overflow:hidden;">
                <div style="height:100%;width:${(count/maxProgram)*100}%;background:var(--accent);"></div>
              </div>
              <span class="mono" style="font-size:11px;color:var(--ink-2);text-align:right;">${count}</span>
            </div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div class="eyebrow mb-3">Top Blockers · ${topBlockers.length}</div>
        ${topBlockers.length === 0 ? `<div class="text-ink-3" style="font-style:italic;font-size:13px;">No blocking P0/P1 Bugs.</div>` : topBlockers.map(b => `
          <a href="#/t/${esc(b.key)}" style="display:block;padding:10px 0;border-bottom:1px solid var(--rule-soft);">
            <div class="row gap-2">
              <span class="pill" style="background:var(--danger-soft);color:var(--danger);border-color:var(--danger-soft);">${esc(b.priority)}</span>
              <span class="mono" style="font-size:12px;color:var(--ink-3);">${esc(b.key)}</span>
              <span style="font-size:13px;" class="truncate flex-1">${esc(b.title)}</span>
            </div>
            <div class="text-ink-3 mt-2" style="font-size:12px;">${esc(b.blocked.reason)}</div>
          </a>`).join("")}
      </div>
    </div>

    <table class="table">
      <thead><tr><th>Key</th><th>Title</th><th>Health</th><th>Phases</th><th>Programs</th><th>PM</th><th>Target</th></tr></thead>
      <tbody>
        ${computed.sort((a,b) => {
          const order = { blocked:0, at_risk:1, on_track:2, not_started:3 };
          return order[a.h.health] - order[b.h.health];
        }).map(({e,h}) => {
          const ms = milestonesForEpic(e.id);
          const done = ms.filter(m => m.status==='complete').length;
          const pm = findUser(e.pmPicId);
          return `<tr onclick="location.hash='#/e/${esc(e.key)}'">
            <td class="mono">${esc(e.key)}</td>
            <td>${esc(e.title)}</td>
            <td>${healthPill(e)}</td>
            <td class="mono" style="font-size:12px;">${ms.length > 0 ? `${done}/${ms.length}` : "—"}</td>
            <td>${e.programs.slice(0,3).map(p => `<span class="pill" style="margin-right:2px;">${esc(p)}</span>`).join("")}</td>
            <td>${avatar(pm,"xs")} <span style="font-size:12px;">${esc(pm?.displayName?.split(' ')[0] ?? '')}</span></td>
            <td class="mono" style="font-size:11px;">${fmtShortDate(e.targetEndDate)}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  `;
}

// ─── /notifications ──────────────────────────────────────────
function viewNotifications() {
  const u = currentUser();
  const mine = state.notifications.filter(n => n.userId === u.id && !n.archived);
  const unread = mine.filter(n => !n.read);
  const read = mine.filter(n => n.read);

  const row = (n) => {
    let href = "#";
    if (n.entityType === "bug") { const b = findBug(n.entityId); if (b) href = `#/t/${b.key}`; }
    if (n.entityType === "epic") { const e = findEpic(n.entityId); if (e) href = `#/e/${e.key}`; }
    if (n.entityType === "milestone") { const m = state.milestones.find(x => x.id === n.entityId); const e = m && findEpic(m.epicId); if (e) href = `#/e/${e.key}?tab=milestones`; }
    return `<a class="notif-row ${n.read?'read':'unread'}" href="${href}" data-id="${esc(n.id)}">
      <div class="notif-dot"></div>
      <div>
        <div style="font-size:13px;color:var(--ink);">${esc(n.title)}</div>
        <div style="font-size:12px;color:var(--ink-3);margin-top:3px;">${esc(n.body)}</div>
        <div class="mono mt-2" style="font-size:10px;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.14em;">${esc(n.kind.replace("_"," "))} · ${relTime(n.createdAt)}</div>
      </div>
      <div class="row gap-2" onclick="event.preventDefault();event.stopPropagation();">
        ${!n.read ? `<button class="btn ghost sm" data-act="mark-read" data-id="${esc(n.id)}">Mark read</button>` : ""}
        <button class="btn ghost sm" data-act="archive-notif" data-id="${esc(n.id)}">Archive</button>
      </div>
    </a>`;
  };

  return `
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-end;gap:24px;">
      <div>
        <div class="eyebrow">Notifications</div>
        <h1>Your <em>inbox</em>.</h1>
        <p class="lede">${unread.length} unread · ${read.length} read. milestone_at_risk fires 7 days before incomplete targets.</p>
      </div>
      <div class="page-actions">
        ${unread.length > 0 ? `<button class="btn secondary" data-act="mark-all-read">Mark all read</button>` : ""}
      </div>
    </div>
    ${unread.length > 0 ? `<div class="eyebrow mb-2">Unread</div><div class="card" style="padding:0;">${unread.map(row).join("")}</div>` : ""}
    ${read.length > 0 ? `<div class="eyebrow mb-2 mt-6">Read</div><div class="card" style="padding:0;">${read.map(row).join("")}</div>` : ""}
    ${mine.length === 0 ? `<div class="empty"><div class="ico">✦</div><h3>Inbox zero.</h3></div>` : ""}
  `;
}

function tombstone(kind, key, bug) {

    cannot_reproduce: { title: "Bug closed as cannot-reproduce", emoji: "○" },
    epic: { title: "Epic not found", emoji: "▭" },
    user: { title: "User not found", emoji: "?" },
    forbidden: { title: "Not available to your role", emoji: "⊘" },
  };
  const m = map[kind] || { title: "Not found", emoji: "✕" };
  return `<div class="tombstone">
    <div class="ico">${m.emoji}</div>
    <h1>${esc(m.title)}</h1>

    ${bug ? `<div class="mt-4" style="font-size:13px;color:var(--ink-3);">${esc(bug.title)}</div>` : ""}

}

/* ════════════════════════════════════════════════════════════════

function bindCommon() {
  // User menu
  $("[data-act=user-menu]")?.addEventListener("click", () => {
    const u = currentUser();
    openModal(`<div class="modal sm">
      <div class="modal-head"><h2>${esc(u.displayName)}</h2><button class="btn ghost sm" data-act="close-modal">✕</button></div>
      <div class="modal-body">
        <div class="row gap-2 mb-3">${avatar(u,"md")}<div><div style="font-size:13px;">${esc(u.email)}</div><div class="mono" style="font-size:11px;color:var(--ink-3);">${esc(u.handle)}</div></div></div>
        <a class="btn secondary" style="width:100%;margin-bottom:6px;" href="#/u/${esc(u.handle)}" data-close>My profile</a>
        <a class="btn secondary" style="width:100%;margin-bottom:6px;" href="#/settings" data-close>Settings</a>
        <button class="btn secondary" style="width:100%;margin-bottom:6px;" data-act="theme-toggle">Toggle ${state.theme==='dark'?'light':'dark'} mode</button>
        <button class="btn danger" style="width:100%;" data-act="logout">Sign out</button>
      </div>
    </div>`);
  });
  $$("[data-act=close-modal], [data-close]").forEach(b => b.addEventListener("click", closeAllModals));

  document.addEventListener("click", (e) => {
    const t = e.target.closest("[data-act]");
    if (!t) return;
    const a = t.dataset.act;
    if (a === "logout") {
      state.currentUserId = null; persist(); closeAllModals();
      navigate("/login");
    } else if (a === "theme-toggle") {
      state.theme = state.theme === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = state.theme;
      persist();
      closeAllModals();
      render();
    } else if (a === "cmdk-open") {
      openCmdK();
    }
  }, { once: false });

  // Cmd-K shortcut
  document.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "k") {
      e.preventDefault();
      openCmdK();
    }
  });
}

function openCmdK() {
  if ($(".cmdk-modal")) return;
  const m = openModal(`<div class="modal cmdk-modal">
    <div class="modal-body" style="padding:0;">
      <input class="input" id="cmdk-input" placeholder="Search Bugs · Epics · users — or 'assign BUG-0042 to andre'" style="border:0;border-radius:0;border-bottom:1px solid var(--rule);font-size:15px;padding:14px 18px;" autofocus />
      <div id="cmdk-results" style="max-height:50vh;overflow-y:auto;"></div>
    </div>
  </div>`);
  const input = $("#cmdk-input");
  const results = $("#cmdk-results");
  const render = () => {
    const q = input.value.trim().toLowerCase();
    let html = "";
    if (q) {
      // NL: assign BUG-X to NAME
      const assignMatch = q.match(/^assign\s+([a-z0-9-]+)\s+to\s+([a-z]+)/i);
      if (assignMatch) {
        const bug = findBugByKey(assignMatch[1].toUpperCase());
        const user = state.users.find(u => u.role === "engineer" && u.handle.split(".")[0].startsWith(assignMatch[2].toLowerCase()));
        if (bug && user) html += cmdkRow(`Assign ${bug.key} → ${user.displayName}`, "command", () => {
          bug.assigneeId = user.id;
          persist(); closeAllModals();
          toast(`${bug.key} assigned to ${user.displayName.split(' ')[0]}`, "success");
          render();
        });
      }
      // NL: move BUG-X to STATUS
      const moveMatch = q.match(/^move\s+([a-z0-9-]+)\s+to\s+(.+)$/i);
      if (moveMatch) {
        const bug = findBugByKey(moveMatch[1].toUpperCase());
        const want = moveMatch[2].trim().toLowerCase().replace(/\s+/g,"_");
        if (bug && BUG_STATUSES.includes(want)) html += cmdkRow(`Move ${bug.key} → ${STATUS_LABEL[want]}`, "command", () => {
          bug.status = want;
          if (want === "in_progress" && !bug.startedAt) bug.startedAt = iso(Date.now());
          if (["verified","cancelled","cannot_reproduce"].includes(want)) bug.closedAt = iso(Date.now());
          persist(); closeAllModals();
          toast(`${bug.key} → ${STATUS_LABEL[want]}`, "success");
          location.hash = `#/t/${bug.key}`;
        });
      }
      // Fuzzy: bugs
      state.bugs.filter(b => (b.key+" "+b.title).toLowerCase().includes(q)).slice(0, 5).forEach(b => {
        html += cmdkRow(`<span class="mono" style="color:var(--ink-3);">${esc(b.key)}</span> · ${esc(b.title)}`, "Bug", () => {
          closeAllModals(); location.hash = `#/t/${b.key}`;
        });
      });
      // Epics
      state.epics.filter(e => (e.key+" "+e.title).toLowerCase().includes(q)).slice(0, 5).forEach(e => {
        html += cmdkRow(`<span class="mono" style="color:var(--ink-3);">${esc(e.key)}</span> · ${esc(e.title)}`, "Epic", () => {
          closeAllModals(); location.hash = `#/e/${e.key}`;
        });
      });
      // Users
      state.users.filter(u => (u.displayName+" "+u.handle).toLowerCase().includes(q)).slice(0, 3).forEach(u => {
        html += cmdkRow(`${esc(u.displayName)} <span style="color:var(--ink-3);">@${esc(u.handle)}</span>`, esc(u.role), () => {
          closeAllModals(); location.hash = `#/u/${u.handle}`;
        });
      });
      if (!html) html = `<div style="padding:24px;color:var(--ink-3);font-style:italic;">No matches.</div>`;
    } else {
      html += `<div style="padding:14px 18px;font-family:var(--font-mono);font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.14em;">Quick nav</div>`;
      ["/me","/epics","/portfolio","/backlog","/my-tickets","/notifications","/settings"].forEach(p => {
        html += cmdkRow(`Navigate to <span class="mono">${esc(p)}</span>`, "Page", () => { closeAllModals(); location.hash = "#" + p; });
      });
    }
    results.innerHTML = html;
    // Re-bind click handlers
    $$(".cmdk-row").forEach((el, i) => {
      el.addEventListener("click", () => cmdkClickHandlers[i]?.());
    });
  };
  const cmdkClickHandlers = [];
  function cmdkRow(label, badge, onClick) {
    cmdkClickHandlers.push(onClick);
    return `<div class="cmdk-row" style="padding:10px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--rule-soft);" onmouseover="this.style.background='var(--bg-elevated)'" onmouseout="this.style.background='var(--bg-card)'">
      <div style="flex:1;font-size:13px;">${label}</div>
      <span class="pill">${esc(badge)}</span>
    </div>`;
  }
  input.addEventListener("input", render);
  render();
}

function bindRoute(routeKey, path, query) {
  if (routeKey === "/me") {
    // nothing special; rows are anchors
  }
  if (path === "/create" || path.startsWith("/create")) {
    // Program pill toggles
    $$("[data-program]").forEach(p => p.addEventListener("click", () => {
      const on = p.dataset.on === "1";
      p.dataset.on = on ? "0" : "1";
      if (on) { p.style.background = ""; p.style.color = ""; p.style.borderColor = ""; }
      else { p.style.background = "var(--accent)"; p.style.color = "#fff"; p.style.borderColor = "var(--accent)"; }
    }));
    const bugForm = $("#bug-form");
    bugForm?.addEventListener("submit", (e) => {
      e.preventDefault();
      const fd = new FormData(bugForm);
      const programs = $$("#program-pills [data-on='1']").map(x => x.dataset.program);
      const num = state.bugs.length + 50; // next BUG-####
      const key = `BUG-${String(num).padStart(4,"0")}`;
      const newBug = {
        id: `t_${Date.now()}`,
        key,
        title: fd.get("title"),
        description: fd.get("description") || "",
        priority: fd.get("priority"),
        severity: fd.get("severity"),
        status: "backlog",
        epicId: fd.get("epicId") || null,
        authorId: currentUser().id,
        assigneeId: fd.get("assigneeId") || null,
        tags: String(fd.get("tags") || "").split(",").map(s => s.trim()).filter(Boolean),
        reproSteps: fd.get("reproSteps") || "",
        expected: fd.get("expected") || "",
        actual: fd.get("actual") || "",
        affectedScope: fd.get("affectedScope") || "",
        sentryLink: fd.get("sentryLink") || null,
        programs,
        createdAt: iso(Date.now()),
        startedAt: null, closedAt: null, blocked: null,
        acceptanceCriteria: [],
      };
      state.bugs.push(newBug); persist();
      toast(`Filed ${key} → Backlog`, "success");
      navigate(`/t/${key}`);
    });
    const epicForm = $("#epic-form");
    epicForm?.addEventListener("submit", (e) => {
      e.preventDefault();
      const fd = new FormData(epicForm);
      const programs = $$("#program-pills [data-on='1']").map(x => x.dataset.program);
      const key = String(fd.get("key")).toUpperCase();
      if (state.epics.some(x => x.key === key)) { toast(`Epic ${key} already exists.`, "error"); return; }
      const newEpic = {
        id: `ep_${Date.now()}`, key,
        title: fd.get("title"),
        thesis: fd.get("thesis") || "",
        description: fd.get("description") || "",
        quarter: fd.get("quarter"),
        programs,
        pmPicId: fd.get("pmPicId"),
        startDate: fd.get("startDate") ? iso(new Date(fd.get("startDate"))) : iso(Date.now()),
        targetEndDate: fd.get("targetEndDate") ? iso(new Date(fd.get("targetEndDate"))) : dShift(60),
        tags: String(fd.get("tags") || "").split(",").map(s => s.trim()).filter(Boolean),
      };
      state.epics.push(newEpic); persist();
      toast(`Epic ${key} created`, "success");
      navigate(`/e/${key}`);
    });
  }

  if (routeKey === "/epics") {
    $("[data-act=new-epic]")?.addEventListener("click", () => navigate("/create?type=epic"));
    // Milestone interactions
    $$("[data-act=add-milestone]").forEach(b => b.addEventListener("click", () => {
      const epicId = b.dataset.epic;
      openMilestoneForm(epicId);
    }));
    $$("[data-act=complete-milestone]").forEach(b => b.addEventListener("click", () => {
      const id = b.dataset.id;
      const m = state.milestones.find(x => x.id === id);
      if (!m) return;
      // Out-of-sequence guard
      const siblings = milestonesForEpic(m.epicId).sort((a,b) => new Date(a.targetDate) - new Date(b.targetDate));
      const idx = siblings.findIndex(x => x.id === id);
      const prevIncomplete = siblings.slice(0, idx).filter(x => x.status !== "complete");
      const doIt = () => {
        if (m.status === "pending") { m.status = "in_progress"; persist(); render(); return; }
        m.status = "complete";
        m.actualDate = iso(Date.now());
        // Auto-advance next
        const next = siblings[idx + 1];
        if (next && next.status === "pending") next.status = "in_progress";
        persist(); render();
        toast(`Milestone ${m.name} complete`, "success");
      };
      if (m.status === "in_progress" && prevIncomplete.length > 0) {
        openModal(`<div class="modal sm">
          <div class="modal-head"><h2>Out-of-sequence?</h2><button class="btn ghost sm" data-act="close-modal">✕</button></div>
          <div class="modal-body">
            <p style="font-size:14px;color:var(--ink-2);">Milestone <strong>${esc(prevIncomplete[0].name)}</strong> is still pending. Complete it first or confirm skip.</p>
          </div>
          <div class="modal-foot">
            <button class="btn secondary sm" data-act="close-modal">Cancel</button>
            <button class="btn danger sm" id="confirm-skip">Confirm skip</button>
          </div>
        </div>`);
        $("#confirm-skip").addEventListener("click", () => { closeAllModals(); doIt(); });
      } else {
        doIt();
      }
    }));
  }

  if (routeKey === "/t") {
    $$("[data-act=advance-bug]").forEach(b => b.addEventListener("click", () => {
      const id = b.dataset.id, next = b.dataset.next;
      const bug = findBug(id);
      if (!bug) return;
      if (next === "verified" && !bug.acceptanceCriteria.every(a => a.done)) {
        toast("Can't mark Verified - some acceptance criteria are unchecked.", "error");
        return;
      }
      bug.status = next;
      if (next === "in_progress" && !bug.startedAt) bug.startedAt = iso(Date.now());
      if (["verified","cancelled","cannot_reproduce"].includes(next)) bug.closedAt = iso(Date.now());
      persist();
      toast(`${bug.key} → ${STATUS_LABEL[next]}`, "success");
      render();
    }));
    $$("[data-act=toggle-ac]").forEach(cb => cb.addEventListener("change", () => {
      const bug = findBug(cb.dataset.bug);
      const ac = bug?.acceptanceCriteria.find(a => a.id === cb.dataset.ac);
      if (ac) { ac.done = cb.checked; persist(); render(); }
    }));
    $$("[data-act=block-bug]").forEach(b => b.addEventListener("click", () => {
      const id = b.dataset.id;
      openModal(`<div class="modal sm">
        <div class="modal-head"><h2>Mark blocked</h2><button class="btn ghost sm" data-act="close-modal">✕</button></div>
        <div class="modal-body">
          <label class="label">Reason</label>
          <textarea class="textarea" id="block-reason" placeholder="What's blocking this?"></textarea>
          <label class="label mt-3">Blocker key · optional</label>
          <input class="input" id="block-key" placeholder="BUG-####" />
        </div>
        <div class="modal-foot">
          <button class="btn secondary sm" data-act="close-modal">Cancel</button>
          <button class="btn primary sm" id="confirm-block">Mark blocked</button>
        </div>
      </div>`);
      $("#confirm-block").addEventListener("click", () => {
        const reason = $("#block-reason").value.trim();
        if (!reason) { toast("Reason required.", "error"); return; }
        const bug = findBug(id);
        bug.blocked = { reason, blockerKey: $("#block-key").value.trim().toUpperCase() || null };
        persist(); closeAllModals(); toast(`${bug.key} marked blocked`, "warn"); render();
      });
    }));
    $$("[data-act=unblock-bug]").forEach(b => b.addEventListener("click", () => {
      const bug = findBug(b.dataset.id);
      if (bug) { bug.blocked = null; persist(); toast(`${bug.key} unblocked`, "success"); render(); }
    }));
    $$("[data-act=post-comment]").forEach(b => b.addEventListener("click", () => {
      const et = b.dataset.et, eid = b.dataset.eid;
      const ta = $(`#cmt-${et}-${eid}`);
      const body = ta.value.trim();
      if (!body) return;
      const mentions = (body.match(/@([a-z][a-z0-9.\-_]+)/g) || []).map(m => m.slice(1)).map(h => state.users.find(u => u.handle === h)?.id).filter(Boolean);
      state.comments.push({
        id: `c_${Date.now()}`, entityType: et, entityId: eid, parentId: null,
        authorId: currentUser().id, body, mentions, createdAt: iso(Date.now()),
      });
      persist(); toast("Comment posted", "success"); render();
    }));
  }

  if (routeKey === "/notifications") {
    $$("[data-act=mark-read]").forEach(b => b.addEventListener("click", (e) => {
      e.preventDefault(); e.stopPropagation();
      const n = state.notifications.find(x => x.id === b.dataset.id);
      if (n) { n.read = true; persist(); render(); }
    }));
    $$("[data-act=archive-notif]").forEach(b => b.addEventListener("click", (e) => {
      e.preventDefault(); e.stopPropagation();
      const n = state.notifications.find(x => x.id === b.dataset.id);
      if (n) { n.archived = true; persist(); render(); }
    }));
    $("[data-act=mark-all-read]")?.addEventListener("click", () => {
      const u = currentUser();
      state.notifications.forEach(n => { if (n.userId === u.id) n.read = true; });
      persist(); render();
    });
    // Auto-mark on click
    $$(".notif-row").forEach(r => r.addEventListener("click", () => {
      const id = r.dataset.id;
      const n = state.notifications.find(x => x.id === id);
      if (n) { n.read = true; persist(); }
    }));
  }

  if (routeKey === "/settings") {
    $("[data-act=reset-demo]")?.addEventListener("click", resetMockData);
    $$("[data-act=pref]").forEach(cb => cb.addEventListener("change", () => {
      const k = cb.dataset.kind, ch = cb.dataset.ch;
      state.channelPrefs[k] = state.channelPrefs[k] || { inApp:false, lark:false, email:false };
      state.channelPrefs[k][ch] = cb.checked;
      persist();
    }));
  }
}

function openMilestoneForm(epicId) {
  openModal(`<div class="modal">
    <div class="modal-head"><h2>Add phase</h2><button class="btn ghost sm" data-act="close-modal">✕</button></div>
    <div class="modal-body">
      <label class="label">Phase name</label>
      <input class="input" id="ms-name" placeholder="e.g. Requirements" />
      <label class="label mt-3">Target date</label>
      <input class="input" type="date" id="ms-target" />
      <label class="label mt-3">Entry criteria</label>
      <textarea class="textarea" id="ms-entry" placeholder="What needs to be true to start this phase?"></textarea>
      <label class="label mt-3">Exit criteria</label>
      <textarea class="textarea" id="ms-exit" placeholder="What needs to be true to mark this complete?"></textarea>
    </div>
    <div class="modal-foot">
      <button class="btn secondary sm" data-act="close-modal">Cancel</button>
      <button class="btn primary sm" id="add-milestone-confirm">Add phase</button>
    </div>
  </div>`);
  $("#add-milestone-confirm").addEventListener("click", () => {
    const name = $("#ms-name").value.trim();
    const target = $("#ms-target").value;
    if (!name) { toast("Name required.", "error"); return; }
    if (!target) { toast("Target date required.", "error"); return; }
    state.milestones.push({
      id: `m_${Date.now()}`, epicId, name,
      targetDate: iso(new Date(target)),
      entryCriteria: $("#ms-entry").value.trim() || "—",
      exitCriteria: $("#ms-exit").value.trim() || "—",
      actualDate: null,
      status: "pending",
    });
    // If this is the first milestone and the Epic startDate is reached, set it to in_progress
    const epic = findEpic(epicId);
    const ms = milestonesForEpic(epicId);
    if (ms.length === 1 && new Date() >= new Date(epic.startDate)) {
      ms[0].status = "in_progress";
    }
    persist();
    closeAllModals();
    toast(`Phase '${name}' added`, "success");
    render();
  });
}

document.documentElement.dataset.theme = state.theme || "light";
if (!location.hash) location.hash = "#/login";
render();
</script>
